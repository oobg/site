services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ${PROJECT_NAME:-raven-web}:${IMAGE_TAG:-latest}
    container_name: raven-web
    env_file: .env
    environment:
      NODE_ENV: production
      TZ: Asia/Seoul
    restart: unless-stopped
    expose:
      - '3000'
    networks:
      - npm
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

networks:
  npm:
    external: true
    name: nginx-proxy-manager_default
