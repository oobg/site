name: deploy

run-name: >
  ${{ github.event_name == 'workflow_dispatch' && '🛠️ 수동 배포' || '🚀 자동 배포' }}
  #${{ github.run_number }} by @${{ github.actor }}

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      APP_NAME: ${{ github.ref_name }}-${{ secrets.PROJECT_NAME }}
      PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
      IMAGE_TAG: ${{ github.sha }}
      # Dockerfile의 --mount=type=cache 재활용을 위해 BuildKit 강제(compose build 포함)
      DOCKER_BUILDKIT: '1'
      COMPOSE_DOCKER_CLI_BUILD: '1'
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      # cache: pnpm 미사용 — self-hosted 러너는 로컬 pnpm store가 영구 잔존하므로
      # 원격 캐시 tar 업/다운로드(≈40~67s)가 순수 낭비였다. 로컬 store로 install은 여전히 빠름.
      - run: pnpm install --frozen-lockfile
      - name: 게이트
        # typecheck·lint·test를 병렬 실행(멀티코어 활용). 각 로그는 접어서 출력하고
        # 하나라도 실패하면 전체 실패시킨다.
        run: |
          set +e
          log=$(mktemp -d)  # repo 밖에 로그를 둬 Docker 컨텍스트 오염 방지
          pnpm typecheck > "$log/typecheck.log" 2>&1 & tc=$!
          pnpm lint      > "$log/lint.log"      2>&1 & lt=$!
          pnpm test      > "$log/test.log"      2>&1 & ts=$!
          wait $tc; rc_tc=$?
          wait $lt; rc_lt=$?
          wait $ts; rc_ts=$?
          dump() { echo "::group::$1 (exit $2)"; cat "$3"; echo "::endgroup::"; }
          dump typecheck "$rc_tc" "$log/typecheck.log"
          dump lint      "$rc_lt" "$log/lint.log"
          dump test      "$rc_ts" "$log/test.log"
          [ "$rc_tc" -eq 0 ] && [ "$rc_lt" -eq 0 ] && [ "$rc_ts" -eq 0 ]
      - name: .env 생성
        env:
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: |
          umask 177
          mkdir -p docker
          printf '%s\n' \
            'NODE_ENV=production' \
            'CONTENT_API_BASE=https://api.raven.kr' \
            'CONTENT_SOURCE=mock' \
            "REVALIDATE_SECRET=${REVALIDATE_SECRET}" \
            > docker/.env
      - name: 빌드 · 기동 · 헬스체크 (실패 시 롤백)
        run: |
          # api·site 러너가 별도 프로세스라 동시 배포를 flock으로 직렬화(경로는 api와 동일해야 서로 대기)
          exec 200>/tmp/raven-deploy.lock
          flock -w 600 200
          set -euo pipefail
          docker network inspect nginx-proxy-manager_default >/dev/null 2>&1 || docker network create nginx-proxy-manager_default
          PREV_CID=$(docker compose -p "$APP_NAME" -f docker/compose.prod.yml ps -q web 2>/dev/null || echo "")
          PREV_IMAGE=$([ -n "$PREV_CID" ] && docker inspect --format '{{.Image}}' "$PREV_CID" || echo "")
          docker compose -p "$APP_NAME" -f docker/compose.prod.yml up -d --build
          ok=""
          # 홈서버 러너는 빌드 직후 CPU가 달궈져 standalone 콜드 스타트가 ~50s까지 걸릴 수 있음 → 창 넉넉히(≈120s)
          for i in $(seq 1 40); do
            cid=$(docker compose -p "$APP_NAME" -f docker/compose.prod.yml ps -q web)
            if [ -n "$cid" ] && docker exec "$cid" wget -qO- http://127.0.0.1:3000/health | grep -q '"status":"ready"'; then ok=1; break; fi
            sleep 3
          done
          if [ -z "$ok" ]; then
            docker compose -p "$APP_NAME" -f docker/compose.prod.yml logs --tail=200 web || true
            if [ -n "$PREV_IMAGE" ]; then
              docker tag "$PREV_IMAGE" "$PROJECT_NAME:rollback"
              IMAGE_TAG=rollback docker compose -p "$APP_NAME" -f docker/compose.prod.yml up -d
            else
              docker compose -p "$APP_NAME" -f docker/compose.prod.yml down
            fi
            exit 1
          fi
